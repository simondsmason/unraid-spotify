{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}
{% if not is_authenticated %}
<div class="card">
    <div class="empty-state" style="padding: 5rem 2rem;">
        <h3>Not Connected</h3>
        <p>Spotify connection expired or not set up.</p>
        <a href="/login" class="btn" style="margin-top: 1rem;">Reconnect to Spotify</a>
    </div>
</div>
{% else %}
<div class="card">
    <h2>Welcome</h2>
    <p style="color: #7f8c8d;">Connected to Spotify. Use the menu to access tools.</p>
</div>
{% endif %}
{% endblock %}
